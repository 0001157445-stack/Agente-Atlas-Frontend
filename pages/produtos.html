<!doctype html><html lang="pt-br"><head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Produtos — AGENTE ATLAS</title><link rel="stylesheet" href="../css/style.css"></head><body>
  <template id="page">
    <div class="topbar">
      <div><h1>Produtos</h1><div class="sub">Catálogo da loja</div></div>
      <button class="btn small" style="width:auto" onclick="abrirModal()">+ Novo produto</button>
    </div>
    <div class="toolbar">
      <input id="busca" placeholder="Buscar por nome, código, categoria..."/>
    </div>
    <div class="table-wrap"><table id="t">
      <thead><tr>
        <th>Código</th><th>Nome</th><th>Categoria</th><th>Tam</th><th>Cor</th>
        <th>Qtd</th><th>Preço</th><th>Ações</th>
      </tr></thead><tbody></tbody></table></div>
  
    <div class="modal-back" id="modal">
      <div class="modal">
        <h2 id="m-title">Novo produto</h2>
        <form id="form-p">
          <input type="hidden" name="id"/>
          <div class="row">
            <div><label>Nome</label><input name="nome" required/></div>
            <div><label>Código</label><input name="codigo"/></div>
          </div>
          <div class="row cols-3">
            <div><label>Categoria</label><input name="categoria"/></div>
            <div><label>Marca</label><input name="marca"/></div>
            <div><label>Cor</label><input name="cor"/></div>
          </div>
          <div class="row cols-3">
            <div><label>Tamanho</label><input name="tamanho" placeholder="P/M/G/GG"/></div>
            <div><label>Preço de compra</label><input name="preco_compra" type="number" step="0.01" value="0"/></div>
            <div><label>Preço de venda</label><input name="preco_venda" type="number" step="0.01" value="0"/></div>
          </div>
          <div class="row cols-3">
            <div><label>Quantidade</label><input name="quantidade" type="number" value="0"/></div>
            <div><label>Estoque mínimo</label><input name="estoque_minimo" type="number" value="0"/></div>
            <div><label>Imagem (URL)</label><input name="imagem"/></div>
          </div>
          <label>Descrição</label><textarea name="descricao" rows="2"></textarea>
          <div style="display:flex;gap:10px;margin-top:14px">
            <button class="btn" type="submit">Salvar</button>
            <button class="btn ghost" type="button" onclick="fecharModal()">Cancelar</button>
          </div>
          <div id="msg" class="msg"></div>
        </form>
      </div>
    </div>
  </template>
  <link rel="stylesheet" href="../css/style.css">

  <script src="../js/config.js"></script>
<script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/shell.js"></script>
  <script>
  renderShell('produtos');
  let cache = [];
  async function carregar(){
    cache = await API.get('/produtos');
    render();
  }
  function render(){
    const q = (document.getElementById('busca').value||'').toLowerCase();
    const list = cache.filter(p => !q ||
      (p.nome+' '+(p.codigo||'')+' '+(p.categoria||'')+' '+(p.marca||'')).toLowerCase().includes(q));
    document.querySelector('#t tbody').innerHTML = list.map(p => `
      <tr>
        <td>${p.codigo||'-'}</td><td>${p.nome}</td><td>${p.categoria||'-'}</td>
        <td>${p.tamanho||'-'}</td><td>${p.cor||'-'}</td>
        <td>${p.quantidade <= p.estoque_minimo
          ? `<span class="badge danger">${p.quantidade}</span>`
          : p.quantidade}</td>
        <td>${fmtMoney(p.preco_venda)}</td>
        <td class="actions">
          <button class="icon-btn" onclick='editar(${p.id})'>Editar</button>
          <button class="icon-btn danger" onclick='remover(${p.id})'>Excluir</button>
        </td>
      </tr>`).join('') || '<tr><td colspan="8" style="color:var(--muted)">Nenhum produto cadastrado.</td></tr>';
  }
  document.getElementById('busca').addEventListener('input', render);
  
  function abrirModal(p){
    document.getElementById('m-title').textContent = p ? 'Editar produto' : 'Novo produto';
    const f = document.getElementById('form-p');
    f.reset();
    if (p) for (const k in p) { if (f.elements[k]) f.elements[k].value = p[k] ?? ''; }
    document.getElementById('modal').classList.add('open');
  }
  function fecharModal(){ document.getElementById('modal').classList.remove('open'); }
  async function editar(id){ const p = await API.get('/produtos/'+id); abrirModal(p); }
  async function remover(id){
    if (!confirm('Remover este produto?')) return;
    await API.del('/produtos/'+id); carregar();
  }
  document.getElementById('form-p').addEventListener('submit', async e => {
    e.preventDefault();
    const f = new FormData(e.target); const body = {};
    f.forEach((v,k)=> body[k] = v === '' ? null : v);
    ['preco_compra','preco_venda','quantidade','estoque_minimo'].forEach(k => body[k] = Number(body[k]||0));
    try {
      if (body.id) await API.put('/produtos/'+body.id, body);
      else { delete body.id; await API.post('/produtos', body); }
      fecharModal(); carregar();
    } catch (err) {
      const m = document.getElementById('msg'); m.className='msg error'; m.textContent = err.message;
    }
  });
  carregar();
  </script></body></html>
